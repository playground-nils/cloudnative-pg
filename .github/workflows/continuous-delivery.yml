      TEST_CLOUD_VENDOR: aks
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ env.GIT_REF }}
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Prepare the environment
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_seconds: 300
        max_attempts: 3
        command: 'sudo apt-get update

          sudo apt-get install -y gettext-base

          '
    - name: Install ginkgo
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_minutes: 1
        max_attempts: 3
        command: '# renovate: datasource=github-releases depName=onsi/ginkgo

          go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.1

          '
    - name: Login into docker registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.REGISTRY_USER }}
        password: ${{ env.REGISTRY_PASSWORD }}
    - name: Azure Login
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Install kubectl
      uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede
      with:
        version: v${{ env.K8S_VERSION }}
    - name: Create AKS cluster
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: "az extension add --allow-preview true --name aks-preview\naz account\
          \ set --subscription ${{ secrets.AZURE_SUBSCRIPTION }}\n\n# name of the\
          \ AKS cluster\nAZURE_AKS=\"${{ secrets.AZURE_RESOURCENAME }}-${GITHUB_RUN_NUMBER}-$(\
          \ echo \"${MATRIX}\" | tr -d '_.-' )\"\necho \"AZURE_AKS=${AZURE_AKS}\"\
          \ >> $GITHUB_ENV\n\n# gather the storage account Key\nAZURE_STORAGE_KEY=$(az\
          \ storage account keys list -g \"${{ secrets.AZURE_RESOURCEGROUP }}\" -n\
          \ \"${AZURE_STORAGE_ACCOUNT}\" --query \"[0].value\" -o tsv)\necho \"::add-mask::$AZURE_STORAGE_KEY\"\
          \necho \"AZURE_STORAGE_KEY=${AZURE_STORAGE_KEY}\" >> $GITHUB_ENV\n\n# name\
          \ of the cluster's blob container in the storage account\nAZURE_BLOB_CONTAINER=\"\
          $( echo \"${MATRIX}\" | tr -d '_.-' | tr '[:upper:]' '[:lower:]' )\"\necho\
          \ \"AZURE_BLOB_CONTAINER=${AZURE_BLOB_CONTAINER}\" >> $GITHUB_ENV\n\n# create\
          \ and login to the AKS cluster\naz aks create --resource-group ${{ secrets.AZURE_RESOURCEGROUP\
          \ }} \\\n  --name ${AZURE_AKS} \\\n  --tier standard \\\n  --node-count\
          \ 3 -k v${K8S_VERSION} --generate-ssh-keys --enable-addons monitoring \\\
          \n  --workspace-resource-id ${{ secrets.AZURE_WORKSPACE_RESOURCE_ID }} \\\
          \n  --aks-custom-headers EnableAzureDiskFileCSIDriver=true\naz aks get-credentials\
          \ --resource-group ${{ secrets.AZURE_RESOURCEGROUP }} \\\n  --name ${AZURE_AKS}\n\
          \n# create diagnostic settings for monitoring kube-apiserver logs\nAKS_CLUSTER_RESOURCE_ID=$(az\
          \ aks show --resource-group ${{ secrets.AZURE_RESOURCEGROUP }} --name ${AZURE_AKS}\
          \ --query id -o tsv --only-show-errors)\naz monitor diagnostic-settings\
          \ create \\\n  --resource-group ${{ secrets.AZURE_RESOURCEGROUP }} \\\n\
          \  --resource ${AKS_CLUSTER_RESOURCE_ID} \\\n  --name diagnostic-kube-apiserver-logs\
          \ \\\n  --workspace ${{ secrets.AZURE_WORKSPACE_RESOURCE_ID }} \\\n  --logs\
          \ '[ { \"category\": \"kube-apiserver\", \"enabled\": true } ]'\n"
    - name: Set up Rook
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_minutes: 27
        max_attempts: 1
        command: "STORAGECLASSNAME=default\n# renovate: datasource=github-releases\
          \ depName=mikefarah/yq\ngo install github.com/mikefarah/yq/v4@v4\nROOK_BASE_URL=https://raw.githubusercontent.com/rook/rook/${{\
          \ env.ROOK_VERSION }}/deploy/examples\nkubectl apply -f ${ROOK_BASE_URL}/crds.yaml\n\
          kubectl apply -f ${ROOK_BASE_URL}/common.yaml\nkubectl apply -f ${ROOK_BASE_URL}/operator.yaml\n\
          kubectl apply -f ${ROOK_BASE_URL}/csi-operator.yaml\ncurl ${ROOK_BASE_URL}/cluster-on-pvc.yaml\
          \ | \\\n  sed '/^ *#/d;/^ *$/d' | \\\n  yq e \".spec.storage.storageClassDeviceSets[].volumeClaimTemplates[].spec.resources.requests.storage\
          \ = \\\"50Gi\\\" |\n    .spec.storage.storageClassDeviceSets[].volumeClaimTemplates[].spec.storageClassName\
          \ = \\\"${STORAGECLASSNAME}\\\" |\n    .spec.mon.volumeClaimTemplate.spec.storageClassName\
          \ = \\\"${STORAGECLASSNAME}\\\" \" - | \\\n  kubectl apply -f -\nwhile true;\
          \ do\n  output=$( kubectl get deploy -n rook-ceph -l app=rook-ceph-osd --no-headers\
          \ -o name )\n  if [[ $(wc -w <<< $output)  == 3 ]]; then\n    break\n  fi\n\
          done\necho \"Waiting for Rook OSDs to be available\"\nkubectl wait deploy\
          \ -n rook-ceph --for condition=available --timeout 480s -l app=rook-ceph-osd\n\
          kubectl apply -f ${ROOK_BASE_URL}/csi/rbd/storageclass.yaml\nkubectl apply\
          \ -f ${ROOK_BASE_URL}/csi/rbd/snapshotclass.yaml\nkubectl annotate storageclass\
          \ ${{env.E2E_DEFAULT_STORAGE_CLASS}} storage.kubernetes.io/default-snapshot-class=${{env.E2E_DEFAULT_VOLUMESNAPSHOT_CLASS}}\
          \ --overwrite\n"
    - name: Prepare patch for customization
      env:
        LEADER_ELECTION: 'true'
        LEADER_LEASE_DURATION: 15
        LEADER_RENEW_DEADLINE: 10
        LIVENESS_PROBE_THRESHOLD: 3
        LOG_LEVEL: ${{ needs.evaluate_options.outputs.log_level }}
      run: 'LOG_LEVEL=${LOG_LEVEL:-info}

        envsubst < hack/e2e/env_override_customized.yaml.template > config/manager/env_override.yaml

        cat config/manager/env_override.yaml

        '
    - name: Run E2E tests
