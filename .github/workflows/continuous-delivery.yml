        if [ -f tests/e2e/out/upgrade_report.json ]; then\n  python .github/generate-test-artifacts.py\
        \ \\\n    -o testartifacts-${{ env.MATRIX }} \\\n    -f tests/e2e/out/upgrade_report.json\
        \ \\\n    --environment=true\nfi\n"
    - name: Archive test artifacts
      if: (always() && !cancelled())
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: testartifacts-${{ env.MATRIX }}
        path: testartifacts-${{ env.MATRIX }}/
        retention-days: 7
    - name: Cleanup test artifacts
      if: always()
      run: rm -rf testartifacts-${{ env.MATRIX }}/
    - name: Cleanup ginkgo JSON report
      if: always()
      run: "if [ -f tests/e2e/out/upgrade_report.json ]; then\n  rm tests/e2e/out/upgrade_report.json\n\
        fi\nif [ -f tests/e2e/out/report.json ]; then\n  rm tests/e2e/out/report.json\n\
        fi\n"
    - name: Archive e2e failure contexts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: test-failure-contexts-${{ env.MATRIX }}
        path: 'tests/*/out/

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Archive e2e logs
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: cluster-logs-${{ env.MATRIX }}
        path: 'tests/e2e/cluster_logs/**

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Clean up
      if: always()
      run: "set +e\naz extension add --allow-preview true --name monitor-control-service\n\
        az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION }}\nattempt=1\n\
        max_attempts=3\nwhile [ \"${attempt}\" -le \"${max_attempts}\" ]; do\n   \
        \ echo \"Deleting cluster. Attempt ${attempt} of ${max_attempts}\"\n    az\
        \ aks delete --resource-group ${{ secrets.AZURE_RESOURCEGROUP }} -y --name\
        \ ${{ env.AZURE_AKS }}\n    status=$?\n    if [[ $status == 0 ]]; then\n \
        \     echo \"AKS cluster deleted\"\n      break\n    fi\n    echo \"Failed\
        \ deleting cluster ${{ env.AZURE_AKS }}, retrying\"\n    sleep 5\n    attempt=$((attempt+1))\n\
        done\nattempt=1\nAZURE_RESOURCEGROUP_LOCATION=\"$( az group show --resource-group\
        \ ${{ secrets.AZURE_RESOURCEGROUP }} --query location -o tsv --only-show-errors\
        \ )\"\nDATA_COLL_RULE_NAME=\"MSCI-${AZURE_RESOURCEGROUP_LOCATION}-${{ env.AZURE_AKS\
        \ }}\"\nwhile [ \"${attempt}\" -le \"${max_attempts}\" ]; do\n    echo \"\
        Deleting data-collection rule ${DATA_COLL_RULE_NAME}. Attempt ${attempt} of\
        \ ${max_attempts}\"\n    az monitor data-collection rule show --name ${DATA_COLL_RULE_NAME}\
        \ --resource-group ${{ secrets.AZURE_RESOURCEGROUP }} --query name\n    #\
        \ if not found, let it go\n    status=$?\n    if [[ $status != 0 ]]; then\n\
        \      echo \"AKS data-collection rule not found\"\n      break\n    fi\n\
        \    az monitor data-collection rule delete -y --name ${DATA_COLL_RULE_NAME}\
        \ --resource-group ${{ secrets.AZURE_RESOURCEGROUP }}\n    status=$?\n   \
        \ if [[ $status == 0 ]]; then\n      echo \"AKS data-collection rule deleted\"\
        \n      break\n    fi\n    echo \"Failed deleting data-collection rule ${DATA_COLL_RULE_NAME},\
        \ retrying\"\n    sleep 5\n    attempt=$((attempt+1))\ndone\n"
  e2e-aks-teardown:
    name: Teardown Microsoft AKS shared resources
    if: 'always() &&

      vars.AKS_ENABLED == ''true'' &&

      needs.generate-jobs.outputs.aksEnabled == ''true'' &&

      needs.generate-jobs.result == ''success'' &&

      needs.e2e-aks-setup.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - e2e-aks-setup
    - e2e-aks
    runs-on: ubuntu-24.04
    env:
      AZURE_STORAGE_ACCOUNT: ${{ needs.e2e-aks-setup.outputs.azure_storage_account
        }}
    steps:
    - name: Azure Login
      if: always()
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Teardown AKS shared resources
      if: always()
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_minutes: 5
        max_attempts: 3
        command: 'az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION }}

          az storage account delete -y --resource-group ${{ secrets.AZURE_RESOURCEGROUP
          }} --name ${{ env.AZURE_STORAGE_ACCOUNT }}

          '
  e2e-eks:
    name: Run E2E on Amazon EKS
    if: '(always() && !cancelled()) &&

      vars.EKS_ENABLED == ''true'' &&

      needs.generate-jobs.outputs.eksEnabled == ''true'' &&

      needs.generate-jobs.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - evaluate_options
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.generate-jobs.outputs.eksMatrix) }}
    runs-on: ubuntu-24.04
    env:
      TEST_DEPTH: ${{ needs.evaluate_options.outputs.test_level }}
      FEATURE_TYPE: ${{ needs.evaluate_options.outputs.feature_type }}
      K8S_VERSION: ${{ matrix.k8s_version }}
      POSTGRES_VERSION: ${{ matrix.postgres_version }}
      POSTGRES_KIND: ${{ matrix.postgres_kind }}
      MATRIX: ${{ matrix.id }}
      POSTGRES_IMG: ${{ matrix.postgres_img }}
      E2E_PRE_ROLLING_UPDATE_IMG: ${{ matrix.postgres_pre_img }}
      TEST_TIMEOUTS: ${{ needs.generate-jobs.outputs.eksTimeout }}
      BRANCH_NAME: ${{ needs.buildx.outputs.branch_name }}
      GIT_REF: ${{ needs.evaluate_options.outputs.git_ref }}
      DEBUG: 'true'
      BUILD_IMAGE: 'false'
      CONTROLLER_IMG: ${{ needs.generate-jobs.outputs.controller_img }}
      CONTROLLER_IMG_DIGEST: ${{ needs.buildx.outputs.controller_img_digest }}
      CONTROLLER_IMG_PRIME_DIGEST: ${{ needs.buildx.outputs.controller_img_prime_digest
        }}
      E2E_DEFAULT_STORAGE_CLASS: gp3
      E2E_CSI_STORAGE_CLASS: gp3
      E2E_DEFAULT_VOLUMESNAPSHOT_CLASS: ebs-csi-snapclass
      AWS_REGION: eu-central-1
      AWS_EKS_ADMIN_IAM_ROLES: ${{ secrets.AWS_EKS_ADMIN_IAM_ROLES }}
      TEST_CLOUD_VENDOR: eks
    steps:
    - name: Set cluster name
      run: 'echo "CLUSTER_NAME=${E2E_SUFFIX}-test-${GITHUB_RUN_NUMBER}-$( echo "${MATRIX}"
        | tr -d ''_.-'' )" >> $GITHUB_ENV

        '
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ env.GIT_REF }}
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Login into docker registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.REGISTRY_USER }}
        password: ${{ env.REGISTRY_PASSWORD }}
    - name: Prepare the environment
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_seconds: 300
        max_attempts: 3
        command: 'sudo apt-get update

          sudo apt-get install -y gettext-base

          '
    - name: Install ginkgo
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_minutes: 1
        max_attempts: 3
        command: '# renovate: datasource=github-releases depName=onsi/ginkgo

          go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.1

          '
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    - name: Install eksctl
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_minutes: 1
        max_attempts: 3
        command: "mkdir -p \"$HOME/.local/bin\"\ncurl -sL \"https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname\
          \ -s)_amd64.tar.gz\" \\\n  | tar xz -C $HOME/.local/bin\necho \"$HOME/.local/bin\"\
          \ >> $GITHUB_PATH\n"
    - name: Configure EKS setup
      run: 'envsubst < hack/e2e/eks-cluster.yaml.template > hack/e2e/eks-cluster.yaml

        '
    - name: Setup EKS
      run: "# Setting up EKS cluster\necho \"create cluster\"\neksctl create cluster\
        \ -f hack/e2e/eks-cluster.yaml\n\n# Create iamidentitymapping\necho \"$AWS_EKS_ADMIN_IAM_ROLES\"\
        \ | while read role\ndo\n  # Masking variables to hide values\n  echo \"::add-mask::$role\"\
        \n  eksctl create iamidentitymapping --cluster \"${CLUSTER_NAME}\" --region=\"\
        ${AWS_REGION}\" --arn \"${role}\" --group system:masters --username admin\n\
        done\n\n# Updating .kubeconfig to use the correct version of client.authentication.k8s.io\
        \ API\naws eks update-kubeconfig --name ${CLUSTER_NAME} --region ${AWS_REGION}\n\
        \n# Installing CRD for support volumeSnapshot\nSNAPSHOTTER_BASE_URL=https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/${{env.EXTERNAL_SNAPSHOTTER_VERSION}}\n\
        kubectl apply -f ${SNAPSHOTTER_BASE_URL}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml\n\
        kubectl apply -f ${SNAPSHOTTER_BASE_URL}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml\n\
        kubectl apply -f ${SNAPSHOTTER_BASE_URL}/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml\n\
        \n## Controller\nkubectl apply -f ${SNAPSHOTTER_BASE_URL}/deploy/kubernetes/snapshot-controller/rbac-snapshot-controller.yaml\n\
        kubectl apply -f ${SNAPSHOTTER_BASE_URL}/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml\n\
        \n# Install volume snapshot class\nkubectl apply -f hack/e2e/volumesnapshotclass-ebs-csi.yaml\n\
        kubectl get volumesnapshotclass\n\n# Change to use gp3 as default storage\
        \ account\nkubectl annotate storageclass gp2 storageclass.kubernetes.io/is-default-class=false\
        \ --overwrite\nkubectl apply -f hack/e2e/storage-class-gp3.yaml\nkubectl annotate\
        \ storageclass ${{env.E2E_DEFAULT_STORAGE_CLASS}} storage.kubernetes.io/default-snapshot-class=${{env.E2E_DEFAULT_VOLUMESNAPSHOT_CLASS}}\
        \ --overwrite\nkubectl get storageclass\n"
    - name: Setup Velero
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      env:
        VELERO_VERSION: v1.18.0
        VELERO_AWS_PLUGIN_VERSION: v1.14.0
      with:
        timeout_minutes: 10
        max_attempts: 3
        on_retry_command: "# Clean up buckets\noutput=$( aws s3api delete-bucket --bucket\
          \ \"${VELERO_BUCKET_NAME}\" --region \"${AWS_REGION}\" 2>&1 )\nstatus=$?\n\
          if [[ $status == 0 ]]; then\n  echo \"S3 Bucket deleted\"\n  break\nfi\n\
          if ( grep \"NoSuchBucket\" <<< \"$output\" ); then\n  echo \"S3 Bucket doesn't\
          \ exist, nothing to remove\"\n  break\nfi\n\n# Uninstall Velero\nkubectl\
          \ delete namespace/velero clusterrolebinding/velero\nkubectl delete crds\
          \ -l component=velero\n"
        command: "VELERO_BUCKET_NAME=\"${CLUSTER_NAME,,}-velero\"\necho \"VELERO_BUCKET_NAME=${VELERO_BUCKET_NAME}\"\
          \ >> $GITHUB_ENV\n\n# Create S3 bucket\naws s3api create-bucket \\\n  --bucket\
          \ \"${VELERO_BUCKET_NAME}\" \\\n  --region \"${AWS_REGION}\" \\\n  --create-bucket-configuration\
          \ LocationConstraint=\"${AWS_REGION}\"\n\n# Download Velero, extract and\
          \ place it in $PATH\ncurl -sL \"https://github.com/vmware-tanzu/velero/releases/download/${VELERO_VERSION}/velero-${VELERO_VERSION}-linux-amd64.tar.gz\"\
          \ | tar xz\nmv velero-${VELERO_VERSION}-linux-amd64/velero $HOME/.local/bin\n\
          \n# Set Velero-specific credentials\necho -e \"[default]\\naws_access_key_id=${{\
          \ secrets.AWS_ACCESS_KEY_ID }}\\naws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY\
          \ }}\" >> credentials-velero\n\n# Install Velero\nvelero install \\\n  --provider\
          \ aws \\\n  --plugins velero/velero-plugin-for-aws:${VELERO_AWS_PLUGIN_VERSION}\
          \ \\\n  --bucket \"${VELERO_BUCKET_NAME}\" \\\n  --backup-location-config\
          \ region=\"${AWS_REGION}\" \\\n  --snapshot-location-config region=\"${AWS_REGION}\"\
          \ \\\n  --secret-file ./credentials-velero \\\n  --wait\n"
    - name: Prepare patch for customization
      env:
        LEADER_ELECTION: 'true'
        LEADER_LEASE_DURATION: 15
        LEADER_RENEW_DEADLINE: 10
        LIVENESS_PROBE_THRESHOLD: 3
        LOG_LEVEL: ${{ needs.evaluate_options.outputs.log_level }}
      run: 'LOG_LEVEL=${LOG_LEVEL:-info}

        envsubst < hack/e2e/env_override_customized.yaml.template > config/manager/env_override.yaml

        cat config/manager/env_override.yaml

        '
    - name: Run E2E tests
      run: hack/e2e/run-e2e.sh
    - name: Report failed E2E tests
      if: failure()
      run: 'set +x

        chmod +x .github/report-failed-test.sh

        ./.github/report-failed-test.sh

        '
    - name: Create individual artifact for each E2E test
      if: (always() && !cancelled())
      env:
        RUNNER: eks
        RUN_ID: ${{ github.run_id }}
        REPOSITORY: ${{ github.repository }}
      run: "set +x\npython .github/generate-test-artifacts.py \\\n  -o testartifacts-${{\
        \ env.MATRIX }} \\\n  -f tests/e2e/out/report.json \\\n  --environment=true\n\
        if [ -f tests/e2e/out/upgrade_report.json ]; then\n  python .github/generate-test-artifacts.py\
        \ \\\n    -o testartifacts-${{ env.MATRIX }} \\\n    -f tests/e2e/out/upgrade_report.json\
        \ \\\n    --environment=true\nfi\n"
    - name: Archive test artifacts
      if: (always() && !cancelled())
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: testartifacts-${{ env.MATRIX }}
        path: testartifacts-${{ env.MATRIX }}/
        retention-days: 7
    - name: Cleanup test artifacts
      if: always()
      run: rm -rf testartifacts-${{ env.MATRIX }}/
    - name: Cleanup ginkgo JSON report
      if: always()
      run: "if [ -f tests/e2e/out/upgrade_report.json ]; then\n  rm tests/e2e/out/upgrade_report.json\n\
        fi\nif [ -f tests/e2e/out/report.json ]; then\n  rm tests/e2e/out/report.json\n\
        fi\n"
    - name: Archive e2e failure contexts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: test-failure-contexts-${{ env.MATRIX }}
        path: 'tests/*/out/

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Archive e2e logs
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: cluster-logs-${{ env.MATRIX }}
        path: 'tests/e2e/cluster_logs/**

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Clean up
      if: always()
      run: "set +e\nCLUSTER_NAME=\"${{ env.CLUSTER_NAME }}\"\nREGION_NAME=\"${{ env.AWS_REGION\
        \ }}\"\nSTACK_NAME=\"eksctl-${CLUSTER_NAME}-cluster\"\nCLOUDFORMATION_STATUS_CURRENT=$(aws\
        \ cloudformation describe-stacks --stack-name \"${STACK_NAME}\" | jq -r '.Stacks[].StackStatus')\n\
        if [[ -z \"${CLOUDFORMATION_STATUS_CURRENT}\" ]]; then\n  echo \"CloudFormation\
        \ stack not found. Nothing to cleanup.\"\n  exit 0\nfi\n\n# Attempt to remove\
        \ any leftover PDB (and Cluster that would recreate it)\n# that could prevent\
        \ the EKS cluster deletion\nkubectl delete cluster --all --all-namespaces\
        \ --now --timeout=30s || true\nkubectl delete pdb --all --all-namespaces --now\
        \ --timeout=30s || true\nkubectl delete pvc --all --all-namespaces --now --timeout=30s\
        \ || true\n# Remove any LoadBalancer service\nkubectl get service --all-namespaces\
        \ -o json | jq -r '.items[] | select(.spec.type==\"LoadBalancer\") | .metadata\
        \ | \"kubectl delete service --now --timeout=30s -n \" + .namespace + \" \"\
        \ + .name' | xargs -rI X bash -c X || true\n\nNODEGROUP_STACK_NAMES=$(eksctl\
        \ get nodegroup --cluster \"${CLUSTER_NAME}\" -o json | jq -r '.[].StackName'\
        \ || true)\n\nattempt=1\nbucket_attempt=1\nmax_attempts=3\n\n# Attempting\
        \ three times to remove the Velero S3 bucket\nVELERO_BUCKET_NAME=${VELERO_BUCKET_NAME:-\"\
        ${CLUSTER_NAME,,}-velero\"}\nwhile [ \"${bucket_attempt}\" -le \"${max_attempts}\"\
        \ ]; do\n    echo \"Deleting S3 Bucket. Attempt ${bucket_attempt} of ${max_attempts}\"\
        \n    output=$( aws s3api delete-bucket --bucket \"${VELERO_BUCKET_NAME}\"\
        \ --region \"${AWS_REGION}\" 2>&1 )\n    status=$?\n    if [[ $status == 0\
        \ ]]; then\n        echo \"S3 Bucket deleted\"\n        break\n    fi\n  \
        \  if ( grep \"NoSuchBucket\" <<< \"$output\" ); then\n        echo \"S3 Bucket\
        \ doesn't exist, nothing to remove\"\n        break\n    fi\n    echo \"Failed\
        \ deleting S3 Bucket ${VELERO_BUCKET_NAME}, retrying\"\n    sleep 5\n    bucket_attempt=$((bucket_attempt+1))\n\
        done\n\n# Attempting three times to cleanly remove the cluster via eksctl\n\
        while [ \"${attempt}\" -le \"${max_attempts}\" ]; do\n    echo \"Deleting\
        \ cluster. Attempt ${attempt} of ${max_attempts}\"\n    output=$( eksctl delete\
        \ cluster -n \"${CLUSTER_NAME}\" -r \"${REGION_NAME}\" --wait --force 2>&1\
        \ )\n    status=$?\n    if [[ $status == 0 ]]; then\n        echo \"EKS cluster\
        \ deleted\"\n        break\n    fi\n    if ( grep \"ResourceNotFoundException:\
        \ No cluster found for name: ${CLUSTER_NAME}\" <<< \"$output\" ); then\n \
        \       echo \"EKS cluster doesn't exist, nothing to remove\"\n        break\n\
        \    fi\n    echo \"Failed deleting cluster ${CLUSTER_NAME}, retrying\"\n\
        \    sleep 5\n    attempt=$((attempt+1))\ndone\n\n# Recheck if something got\
        \ stuck, and use harder methods to clean up\nCLOUDFORMATION_STATUS_CURRENT=$(aws\
        \ cloudformation describe-stacks --stack-name \"${STACK_NAME}\" | jq -r '.Stacks[].StackStatus')\n\
        if [ -n \"${CLOUDFORMATION_STATUS_CURRENT}\" ] ; then\n  echo \"::warning\
        \ file=continuous-delivery.yml::eksctl failed deleting a cluster cleanly\"\
        \n  # When the status of CloudFormation stack managed by eksctl reports an\
        \ error, try to delete resources directly with AWS CLI\n  pip install -r .github/workflow-requirements.txt\n\
        \  for vpc_id in $(aws ec2 describe-vpcs | jq -r '.Vpcs[] | select(.Tags?[]?\
        \ | .Key == \"Name\" and (.Value | contains(\"'\"${STACK_NAME}\"'\"))).VpcId');\
        \ do\n    python .github/vpc_destroy.py --vpc_id \"${vpc_id}\" --region \"\
        ${REGION_NAME}\" --services ec2\n  done\n  # Then we try to delete the cluster\
        \ cleanly and the cloudformation\n  if aws eks describe-cluster --name \"\
        ${CLUSTER_NAME}\" --region \"${REGION_NAME}\" ; then\n     eksctl delete cluster\
        \ -n \"${CLUSTER_NAME}\" -r \"${REGION_NAME}\" --wait --force\n  fi\n  if\
        \ [ -n \"${NODEGROUP_STACK_NAMES}\" ] ; then\n    for NODEGROUP_STACK_NAME\
        \ in ${NODEGROUP_STACK_NAMES}; do\n      if aws cloudformation describe-stacks\
        \ --stack-name \"${NODEGROUP_STACK_NAME}\" --region \"${REGION_NAME}\" ; then\n\
        \         aws cloudformation delete-stack --stack-name \"${NODEGROUP_STACK_NAME}\"\
        \ --region \"${REGION_NAME}\"\n      fi\n    done\n  fi\n  if aws cloudformation\
        \ describe-stacks --stack-name \"${STACK_NAME}\" --region \"${REGION_NAME}\"\
        \ ; then\n     aws cloudformation delete-stack --stack-name \"${STACK_NAME}\"\
        \ --region \"${REGION_NAME}\"\n  fi\nfi\n\n# Clear up leftover volumes\nwhile\
        \ read -r volume; do\n  echo \"Deleting $volume of cluster $CLUSTER_NAME ...\"\
        \n  if ! aws ec2 delete-volume --region \"${REGION_NAME}\" --volume-id \"\
        $volume\" ; then\n      echo \"::warning file=continuous-delivery.yml::Failed\
        \ deleting $volume of cluster $CLUSTER_NAME\"\n  fi\ndone < <(aws ec2 describe-volumes\
        \ --region \"${REGION_NAME}\" --query 'Volumes[?not_null(Tags[?Key == `kubernetes.io/cluster/'\"\
        $CLUSTER_NAME\"'` && Value == `owned`].Value)].VolumeId' | jq -r '.[]' ||\
        \ true)\n"
  e2e-gke:
    name: Run E2E on Google GKE
    if: '(always() && !cancelled()) &&

      vars.GKE_ENABLED == ''true'' &&

      needs.generate-jobs.outputs.gkeEnabled == ''true'' &&

      needs.generate-jobs.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - evaluate_options
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.generate-jobs.outputs.gkeMatrix) }}
    runs-on: ubuntu-24.04
    env:
      TEST_DEPTH: ${{ needs.evaluate_options.outputs.test_level }}
      FEATURE_TYPE: ${{ needs.evaluate_options.outputs.feature_type }}
      K8S_VERSION: ${{ matrix.k8s_version }}
      POSTGRES_VERSION: ${{ matrix.postgres_version }}
      POSTGRES_KIND: ${{ matrix.postgres_kind }}
      MATRIX: ${{ matrix.id }}
      POSTGRES_IMG: ${{ matrix.postgres_img }}
      E2E_PRE_ROLLING_UPDATE_IMG: ${{ matrix.postgres_pre_img }}
      TEST_TIMEOUTS: ${{ needs.generate-jobs.outputs.gkeTimeout }}
      BRANCH_NAME: ${{ needs.buildx.outputs.branch_name }}
      GIT_REF: ${{ needs.evaluate_options.outputs.git_ref }}
      DEBUG: 'true'
      BUILD_IMAGE: 'false'
      CONTROLLER_IMG: ${{ needs.generate-jobs.outputs.controller_img }}
      CONTROLLER_IMG_DIGEST: ${{ needs.buildx.outputs.controller_img_digest }}
      CONTROLLER_IMG_PRIME_DIGEST: ${{ needs.buildx.outputs.controller_img_prime_digest
        }}
      E2E_DEFAULT_STORAGE_CLASS: standard-rwo
      E2E_CSI_STORAGE_CLASS: standard-rwo
      E2E_DEFAULT_VOLUMESNAPSHOT_CLASS: pd-csi-snapclass
      REGION: europe-west3
      TEST_CLOUD_VENDOR: gke
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ env.GIT_REF }}
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Login into docker registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.REGISTRY_USER }}
        password: ${{ env.REGISTRY_PASSWORD }}
    - name: Prepare the environment
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_seconds: 300
        max_attempts: 3
        command: 'sudo apt-get update

          sudo apt-get install -y gettext-base

          '
    - name: Install ginkgo
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      with:
        timeout_seconds: 120
        max_attempts: 3
        command: '# renovate: datasource=github-releases depName=onsi/ginkgo

          go install github.com/onsi/ginkgo/v2/ginkgo@v2.28.1

          '
    - name: Set cluster name
      run: '# GKE cluster names rules:

        # only lowercase alphanumerics and ''-'' allowed, must start with a letter
        and end with an alphanumeric,

        # and must be no longer than 40 characters

        # We need to shorten the name and lower the case

        SHORT_ID=$( echo "${MATRIX}" | tr -d ''_.-'' | tr ''[:upper:]'' ''[:lower:]'')

        echo "CLUSTER_NAME=${E2E_SUFFIX}-${GITHUB_RUN_NUMBER}-${SHORT_ID}" >> $GITHUB_ENV

        '
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    - name: Set up Cloud SDK and kubectl
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        install_components: kubectl,gke-gcloud-auth-plugin
    - name: Create GKE cluster
      run: "set +e\n# We may go over the amount of API requests allowed\n# by Google\
        \ when creating all the clusters at the same time.\n# We give a few attempts\
        \ at creating the cluster before giving up.\n# The following command will\
        \ create a 3 nodes cluster, with each\n# node deployed in its own availability\
        \ zone.\nfor i in `seq 1 5`; do\n  if gcloud container clusters create ${{\
        \ env.CLUSTER_NAME }} \\\n    --num-nodes=1 \\\n    --cluster-version=${{\
        \ env.K8S_VERSION }} \\\n    --region=${{ env.REGION }} \\\n    --disk-size=20\
        \ \\\n    --machine-type=e2-standard-2 \\\n    --labels=cluster=${{ env.CLUSTER_NAME\
        \ }}\n  then\n    exit 0\n  fi\n  echo \"Couldn't create the cluster. Retrying\
        \ in 100s.\"\n  sleep 100\ndone\necho \"Couldn't create the cluster. Failing.\"\
        \nexit 1\n"
    - name: Get GKE kubeconfig credentials
      env:
        USE_GKE_GCLOUD_AUTH_PLUGIN: 'True'
      run: 'gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} --region
        ${{ env.REGION }} --project ${{ secrets.GCP_PROJECT_ID }}

        '
    - name: Configure Storage
      run: "# Even if the cluster is ready, it might take some time before the\n#\
        \ volumesnapshot CRDs are available\nattempt=1\nmax_attempts=10\nwhile [ \"\
        ${attempt}\" -le \"${max_attempts}\" ]; do\n  if kubectl get crd volumesnapshotclasses.snapshot.storage.k8s.io\
        \ >/dev/null 2>&1; then\n    echo \"VolumeSnapshot CRDs are available.\"\n\
        \    break\n  fi\n  echo \"Waiting for snapshot CRDs...\"\n  sleep 20\n  attempt=$((attempt+1))\n\
        done\n# Install volume snapshot class\nkubectl apply -f hack/e2e/volumesnapshotclass-pd-csi.yaml\n\
        # Change to use standard-rwo as default storage account\nkubectl annotate\
        \ storageclass ${{env.E2E_DEFAULT_STORAGE_CLASS}} storage.kubernetes.io/default-snapshot-class=${{env.E2E_DEFAULT_VOLUMESNAPSHOT_CLASS}}\
        \ --overwrite\nkubectl get storageclass\n"
    - name: Prepare patch for customization
      env:
        LEADER_ELECTION: 'false'
        LEADER_LEASE_DURATION: 240
        LEADER_RENEW_DEADLINE: 230
        LIVENESS_PROBE_THRESHOLD: 9
        LOG_LEVEL: ${{ needs.evaluate_options.outputs.log_level }}
      run: 'LOG_LEVEL=${LOG_LEVEL:-info}

        envsubst < hack/e2e/env_override_customized.yaml.template > config/manager/env_override.yaml

        cat config/manager/env_override.yaml

        '
    - name: Run E2E tests
      run: hack/e2e/run-e2e.sh
    - name: Report failed E2E tests
      if: failure()
      run: 'set +x

        chmod +x .github/report-failed-test.sh

        ./.github/report-failed-test.sh

        '
    - name: Create individual artifact for each E2E test
      if: (always() && !cancelled())
      env:
        RUNNER: gke
        RUN_ID: ${{ github.run_id }}
        REPOSITORY: ${{ github.repository }}
      run: "set +x\npython .github/generate-test-artifacts.py \\\n  -o testartifacts-${{\
        \ env.MATRIX }} \\\n  -f tests/e2e/out/report.json \\\n  --environment=true\n\
        if [ -f tests/e2e/out/upgrade_report.json ]; then\n  python .github/generate-test-artifacts.py\
        \ \\\n    -o testartifacts-${{ env.MATRIX }} \\\n    -f tests/e2e/out/upgrade_report.json\
        \ \\\n    --environment=true\nfi\n"
    - name: Archive test artifacts
      if: (always() && !cancelled())
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: testartifacts-${{ env.MATRIX }}
        path: testartifacts-${{ env.MATRIX }}/
        retention-days: 7
    - name: Cleanup test artifacts
      if: always()
      run: rm -rf testartifacts-${{ env.MATRIX }}/
    - name: Cleanup ginkgo JSON report
      if: always()
      run: "if [ -f tests/e2e/out/upgrade_report.json ]; then\n  rm tests/e2e/out/upgrade_report.json\n\
        fi\nif [ -f tests/e2e/out/report.json ]; then\n  rm tests/e2e/out/report.json\n\
        fi\n"
    - name: Archive e2e failure contexts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: test-failure-contexts-${{ env.MATRIX }}
        path: 'tests/*/out/

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Archive e2e logs
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: cluster-logs-${{ env.MATRIX }}
        path: 'tests/e2e/cluster_logs/**

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Clean up
      if: always()
      run: "set +e\n# Attempt to remove any leftover resource\nkubectl delete cluster\
        \ --all --all-namespaces --now --timeout=30s || true\nkubectl delete pdb --all\
        \ --all-namespaces --now --timeout=30s || true\nkubectl delete pvc --all --all-namespaces\
        \ --now --timeout=30s || true\n\n# Wait until all the PVs provisioned are\
        \ actually reclaimed\nkubectl wait --for delete --all pv --timeout=60s ||\
        \ true\n\nattempt=1\nmax_attempts=3\nwhile [ \"${attempt}\" -le \"${max_attempts}\"\
        \ ]; do\n  gcloud container clusters delete ${{ env.CLUSTER_NAME }} --region=${{\
        \ env.REGION }} --quiet\n  status=$?\n  if [[ $status == 0 ]]; then\n    \
        \  echo \"GKS cluster ${{ env.CLUSTER_NAME }} deleted from region ${{ env.REGION\
        \ }}\"\n      break\n  fi\n  echo \"Failed deleting cluster ${{ env.CLUSTER_NAME\
        \ }} from region ${{ env.REGION }}, retrying\"\n  sleep 5\n  attempt=$((attempt+1))\n\
        done\n\n# The node's disks are not automatically deleted when the cluster\
        \ is removed.\n# We delete all the disks tagged with the name of the cluster\
        \ that are not\n# owned by anyone.\n\nattempt=1\nmax_attempts=3\nwhile [ \"\
        ${attempt}\" -le \"${max_attempts}\" ]; do\n  IDS=$(gcloud compute disks list\
        \ --filter=\"labels.cluster=${{ env.CLUSTER_NAME }} AND region:${{ env.REGION\
        \ }} AND -users:*\" --format=\"value(id)\")\n  amount=\"$(echo $IDS | awk\
        \ '{print NF}')\"\n  if [[ \"$amount\" == 3 ]]; then\n    echo -e \"Found\
        \ the 3 disks to be removed:\\n$IDS\"\n    break\n  fi\n  echo \"Expected\
        \ 3 disks to delete but found $amount, waiting and retrying\"\n  sleep 20\n\
        \  attempt=$((attempt+1))\ndone\n\nfor ID in ${IDS}\ndo\n  attempt=1\n  max_attempts=3\n\
        \  while [ \"${attempt}\" -le \"${max_attempts}\" ]; do\n     gcloud compute\
        \ disks delete --region \"${{ env.REGION }}\" --quiet \"${ID}\"\n     status=$?\n\
        \     if [[ $status == 0 ]]; then\n        echo \"computer disk ${ID} deleted\"\
        \n        break\n     fi\n     echo \"Failed deleting disk ${ID} from region\
        \ ${{ env.REGION }}, retrying\"\n     sleep 5\n     attempt=$((attempt+1))\n\
        \  done\ndone\n"
  e2e-openshift:
    name: Run E2E on OpenShift
    if: 'always() && !cancelled() &&

      vars.OPENSHIFT_ENABLED == ''true'' &&

      needs.generate-jobs.outputs.openshiftEnabled == ''true'' &&

      needs.generate-jobs.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - evaluate_options
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.generate-jobs.outputs.openshiftMatrix) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      TEST_DEPTH: ${{ needs.evaluate_options.outputs.test_level }}
      FEATURE_TYPE: ${{ needs.evaluate_options.outputs.feature_type }}
      K8S_VERSION: ${{ matrix.k8s_version }}
      POSTGRES_VERSION: ${{ matrix.postgres_version }}
      POSTGRES_KIND: ${{ matrix.postgres_kind }}
      MATRIX: ${{ matrix.id }}
      POSTGRES_IMG: ${{ matrix.postgres_img }}
      E2E_PRE_ROLLING_UPDATE_IMG: ${{ matrix.postgres_pre_img }}
      TEST_TIMEOUTS: ${{ needs.generate-jobs.outputs.openshiftTimeout }}
      BRANCH_NAME: ${{ needs.buildx.outputs.branch_name }}
      GIT_REF: ${{ needs.evaluate_options.outputs.git_ref }}
      DEBUG: 'true'
      BUILD_IMAGE: 'false'
      CONTROLLER_IMG: ${{ needs.generate-jobs.outputs.controller_img }}
      E2E_DEFAULT_STORAGE_CLASS: gp3-csi
      E2E_CSI_STORAGE_CLASS: gp3-csi
      E2E_DEFAULT_VOLUMESNAPSHOT_CLASS: csi-aws-vsc
      TEST_CLOUD_VENDOR: ocp
      AWS_BASE_DOMAIN: ${{ secrets.AWS_BASE_DOMAIN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: eu-central-1
      AWS_EKS_ADMIN_IAM_ROLES: ${{ secrets.AWS_EKS_ADMIN_IAM_ROLES }}
      REDHAT_PULL: ${{ secrets.REDHAT_PULL }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
    - name: Set cluster name
      env:
        MATRIX_K8S_VERSION: ${{ matrix.k8s_version }}
      run: 'echo "CLUSTER_NAME=${E2E_SUFFIX}-ocp-${GITHUB_RUN_NUMBER}-$( echo "${MATRIX_K8S_VERSION}"
        | tr -d ''.'' )" >> $GITHUB_ENV

        '
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ env.GIT_REF }}
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      with:
        platforms: ${{ env.PLATFORMS }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: Login into docker registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.REGISTRY_USER }}
        password: ${{ env.REGISTRY_PASSWORD }}
    - name: Build and push the operator and catalog
      env:
        CONTROLLER_IMG: ${{ needs.buildx.outputs.controller_img_ubi }}
        BUNDLE_IMG: ${{ needs.buildx.outputs.bundle_img }}
        INDEX_IMG: ${{ needs.buildx.outputs.index_img }}
        CATALOG_IMG: ${{ needs.buildx.outputs.catalog_img }}
      run: 'make olm-catalog

        '
    - name: Install OC Installer and client
      uses: redhat-actions/openshift-tools-installer@144527c7d98999f2652264c048c7a9bd103f8a82
      with:
        source: mirror
        openshift-install: ${{ env.K8S_VERSION }}
        oc: ${{ env.K8S_VERSION }}
    - name: Install OpenShift Cluster ${{ env.K8S_VERSION }}
      timeout-minutes: 60
      run: 'envsubst < hack/install-config.yaml.template > hack/install-config.yaml

        openshift-install create cluster --dir hack/ --log-level debug

        '
    - name: Install operator-sdk
      run: 'make operator-sdk

        '
    - name: Install preflight
      run: 'make preflight

        '
    - name: Create Secret
      run: "export KUBECONFIG=$(pwd)/hack/auth/kubeconfig\noc create ns cloudnative-pg\n\
        oc -n cloudnative-pg create secret docker-registry cnpg-pull-secret \\\n \
        \ --docker-server=\"$REGISTRY\" --docker-username=\"$REGISTRY_USER\" --docker-password=\"\
        $REGISTRY_PASSWORD\"\n"
    - name: Run preflight operator test
      timeout-minutes: 30
      env:
        BUNDLE_IMG: ${{ needs.buildx.outputs.bundle_img }}
        PFLT_INDEXIMAGE: ${{ needs.buildx.outputs.index_img }}
        PFLT_SCORECARD_WAIT_TIME: '1200'
        PFLT_ARTIFACTS: preflight_operator_results
      run: "export PATH=$(pwd)/bin/:${PATH}\nexport KUBECONFIG=$(pwd)/hack/auth/kubeconfig\n\
        oc -n cloudnative-pg get secret cnpg-pull-secret \\\n  -o jsonpath='{.data.\\\
        .dockerconfigjson}' | base64 -d > docker-config.json\npreflight check operator\
        \ ${BUNDLE_IMG} \\\n  --docker-config docker-config.json --loglevel trace\n"
    - name: Check preflight operator results
      run: "PASS=`jq -r .passed preflight_operator_results/results.json`\nif [[ \"\
        $PASS\" == \"false\" ]]\nthen\n    exit 1\nfi\n"
    - name: Run E2E tests
      timeout-minutes: 180
      if: (always() && !cancelled())
      run: '# Before running on OpenShift we make sure that the catalog is created

        # in the openshift-marketplace namespace

        sed -i -e ''s/namespace: operators/namespace: openshift-marketplace/'' cloudnative-pg-catalog.yaml

        find -type f -name "cloudnative-pg-catalog.yaml"

        cat cloudnative-pg-catalog.yaml

        KUBECONFIG=$(pwd)/hack/auth/kubeconfig bash -x hack/e2e/run-e2e-ocp.sh

        '
    - name: Report failed E2E tests
      if: failure()
      run: 'set +x

        chmod +x .github/report-failed-test.sh

        ./.github/report-failed-test.sh

        '
    - name: Create individual artifact for each E2E test
      if: (always() && !cancelled())
      env:
        RUNNER: openshift
        RUN_ID: ${{ github.run_id }}
        REPOSITORY: ${{ github.repository }}
      run: "set +x\npython .github/generate-test-artifacts.py \\\n  -o testartifacts-${{\
        \ env.MATRIX }} \\\n  -f tests/e2e/out/report.json \\\n  --environment=true\n\
        if [ -f tests/e2e/out/upgrade_report.json ]; then\n  python .github/generate-test-artifacts.py\
        \ \\\n    -o testartifacts-${{ env.MATRIX }} \\\n    -f tests/e2e/out/upgrade_report.json\
        \ \\\n    --environment=true\nfi\n"
    - name: Archive test artifacts
      if: (always() && !cancelled())
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: testartifacts-${{ env.MATRIX }}
        path: testartifacts-${{ env.MATRIX }}/
        retention-days: 7
    - name: Cleanup test artifacts
      if: always()
      run: rm -rf testartifacts-${{ env.MATRIX }}/
    - name: Cleanup ginkgo JSON report
      if: always()
      run: "if [ -f tests/e2e/out/upgrade_report.json ]; then\n  rm tests/e2e/out/upgrade_report.json\n\
        fi\nif [ -f tests/e2e/out/report.json ]; then\n  rm tests/e2e/out/report.json\n\
        fi\n"
    - name: Archive e2e failure contexts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: test-failure-contexts-${{ env.MATRIX }}
        path: 'tests/*/out/

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Archive e2e logs
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: cluster-logs-${{ env.MATRIX }}
        path: 'tests/e2e/cluster_logs/**

          '
        retention-days: 7
        if-no-files-found: ignore
    - name: Destroy OpenShift Cluster ${{ env.K8S_VERSION }}
      if: always()
      run: 'openshift-install destroy cluster --dir hack/

        '
  summarize-e2e-tests:
    name: E2E test suite
    needs:
    - evaluate_options
    - e2e-kind
    - e2e-k3d
    - e2e-eks
    - e2e-aks
    - e2e-gke
    - e2e-openshift
    if: "(always() && !cancelled()) &&\n((\n  needs.e2e-kind.result == 'success' ||\n\
      \  needs.e2e-kind.result == 'failure'\n) ||\n(\n  needs.e2e-k3d.result == 'success'\
      \ ||\n  needs.e2e-k3d.result == 'failure'\n) ||\n(\n  needs.e2e-eks.result ==\
      \ 'success' ||\n  needs.e2e-eks.result == 'failure'\n) ||\n(\n  needs.e2e-aks.result\
      \ == 'success' ||\n  needs.e2e-aks.result == 'failure'\n) ||\n(\n  needs.e2e-gke.result\
      \ == 'success' ||\n  needs.e2e-gke.result == 'failure'\n) ||\n(\n  needs.e2e-openshift.result\
      \ == 'success' ||\n  needs.e2e-openshift.result == 'failure'\n))\n"
    runs-on: ubuntu-24.04
    steps:
    - name: Create a directory for the artifacts
      run: mkdir test-artifacts
    - name: Download all artifacts to the directory
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        path: test-artifacts
        pattern: testartifacts-*
    - name: Flatten all artifacts onto directory
      run: 'mkdir test-artifacts/data

        mv test-artifacts/*/*.json test-artifacts/data || true

        '
    - name: Display the structure of the artifact folder
      run: ls -R test-artifacts/data
    - name: Compute the E2E test summary
      id: generate-summary
      uses: cloudnative-pg/ciclops@fc1c72c2eb99e10aa437f14cd8563686b4b6e3b1
      with:
        artifact_directory: test-artifacts/data
    - name: If there is an overflow summary, archive it
      if: steps.generate-summary.outputs.Overflow
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ steps.generate-summary.outputs.Overflow }}
        path: ${{ steps.generate-summary.outputs.Overflow }}
        retention-days: 7
    - name: Send the Ciclops view over Slack
      uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661
      if: "github.repository_owner == env.REPOSITORY_OWNER &&\n(\n  github.event_name\
        \ == 'schedule' ||\n  (\n    steps.generate-summary.outputs.alerts &&\n  \
        \  startsWith(needs.evaluate_options.outputs.git_ref, 'refs/heads/release-')\n\
        \  )\n)\n"
      env:
        SLACK_COLOR: ${{ steps.generate-summary.outputs.alerts && 'failure' || 'success'
          }}
        SLACK_ICON: https://avatars.githubusercontent.com/u/85171364?size=48
        SLACK_USERNAME: ${{ env.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_TITLE: CICLOPS view for ${{ github.repository }}
        SLACK_MESSAGE_ON_SUCCESS: '${{ steps.generate-summary.outputs.thermometer
          }}

          '
        SLACK_MESSAGE_ON_FAILURE: '${{ steps.generate-summary.outputs.thermometer
          }}

          :warning: *Systematic failures!*

          ${{ steps.generate-summary.outputs.alerts }}

          '
        SLACK_FOOTER: '<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
          github.run_id }}|*See full CI run*>

          '
    - name: Delete the downloaded files
      run: rm -rf test-artifacts
  ok-to-merge:
    name: Label the PR as "ok to merge :ok_hand:"
    needs:
    - evaluate_options
    - e2e-kind
    if: 'always() &&

      needs.e2e-kind.result == ''success'' &&

      github.event_name == ''issue_comment'' &&

      needs.evaluate_options.outputs.test_level == ''4''

      '
    runs-on: ubuntu-24.04
    steps:
    - name: Check preconditions
      id: get_pr_number_and_labels
      env:
        GITHUB_TOKEN: ${{ secrets.REPO_GHA_PAT }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: 'ok_label=$(gh pr view "${ISSUE_NUMBER}" --json labels -q ".labels.[].name"
        2>/dev/null | grep "ok to merge :ok_hand:" || :)

        echo "OK_LABEL=${ok_label}" >> $GITHUB_ENV

        '
    - name: Label the PR as "ok to merge :ok_hand:"
      if: 'env.OK_LABEL == ''''

        '
      uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf
      with:
        github_token: ${{ secrets.REPO_GHA_PAT }}
        number: ${{ github.event.issue.number }}
        labels: 'ok to merge :ok_hand:'
  unlabel-ok-to-merge:
    name: Remove the "ok to merge :ok_hand:" label from the PR
    needs:
    - evaluate_options
    - e2e-kind
    if: 'always() &&

      needs.e2e-kind.result == ''failure'' &&

      github.event_name == ''issue_comment''

      '
    runs-on: ubuntu-24.04
    steps:
    - name: Check preconditions
      id: get_pr_number_and_labels
      env:
        GITHUB_TOKEN: ${{ secrets.REPO_GHA_PAT }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: 'ok_label=$(gh pr view "${ISSUE_NUMBER}" --json labels -q ".labels.[].name"
        2>/dev/null | grep "ok to merge :ok_hand:" || :)

        echo "OK_LABEL=${ok_label}" >> $GITHUB_ENV

        '
    - name: Remove "ok to merge :ok_hand:" label from PR
      if: 'env.OK_LABEL != ''''

        '
      uses: actions-ecosystem/action-remove-labels@2ce5d41b4b6aa8503e285553f75ed56e0a40bae0
      with:
