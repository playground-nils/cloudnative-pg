  e2e-aks-setup:
    name: Setup shared resources for Microsoft AKS E2Es
    if: '(always() && !cancelled()) &&

      vars.AKS_ENABLED == ''true'' &&

      needs.generate-jobs.outputs.aksEnabled == ''true'' &&

      needs.generate-jobs.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - evaluate_options
    runs-on: ubuntu-24.04
    outputs:
      azure_storage_account: ${{ steps.setup.outputs.azure_storage_account }}
    steps:
    - name: Azure Login
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Create AKS shared resources
      uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08
      id: setup
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: "az extension add --allow-preview true --name aks-preview\naz account\
          \ set --subscription ${{ secrets.AZURE_SUBSCRIPTION }}\n\nAZURE_STORAGE_ACCOUNT=\"\
          ${GITHUB_RUN_NUMBER}${E2E_SUFFIX}\"\naz storage account create \\\n  --resource-group\
          \ ${{ secrets.AZURE_RESOURCEGROUP }} \\\n  --name ${AZURE_STORAGE_ACCOUNT}\
          \ \\\n  --sku Standard_LRS -o none\n\n# Output storage account name\necho\
          \ \"azure_storage_account=${AZURE_STORAGE_ACCOUNT}\" >> $GITHUB_OUTPUT\n"
  e2e-aks:
    name: Run E2E on Microsoft AKS
    if: '(always() && !cancelled()) &&

      vars.AKS_ENABLED == ''true'' &&

      needs.generate-jobs.outputs.aksEnabled == ''true'' &&

      needs.generate-jobs.result == ''success'' &&

      needs.e2e-aks-setup.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - evaluate_options
    - e2e-aks-setup
    strategy:
      fail-fast: false
