name: continuous-delivery
'on':
  issue_comment:
    types:
    - created
  workflow_dispatch:
    inputs:
      depth:
        description: Depth (push, pull_request, main (default), schedule)
        required: true
        default: main
      limit:
        description: Limit to the specified engines list (kind, k3d, eks, aks, gke,
          openshift)
        required: false
      test_level:
        description: 'Test level: 0(highest) to 4(lowest). Default is 4.'
        required: false
        default: '4'
      feature_type:
        description: 'Feature Type (backup-restore, basic, cluster-metadata, declarative-databases,
          disruptive, image-volume-extensions, importing-databases, maintenance, no-openshift,
          observability, operator, performance, plugin, pod-scheduling, postgres-configuration,
          postgres-major-upgrade, publication-subscription, recovery, replication,
          security, self-healing, service-connectivity, smoke, snapshot, storage,
          tablespaces, upgrade)

          '
        required: false
      log_level:
        description: Log level for operator (error, warning, info, debug(default),
          trace)
        required: false
        default: debug
  schedule:
  - cron: 0 1 * * *
permissions: read-all
env:
  KUBEBUILDER_VERSION: 2.3.1
  KIND_VERSION: v0.31.0
  K3D_VERSION: v5.8.3
  ROOK_VERSION: v1.19.4
  EXTERNAL_SNAPSHOTTER_VERSION: v8.5.0
  OPERATOR_IMAGE_NAME: ghcr.io/${{ github.repository }}-testing
  BUILD_PUSH_PROVENANCE: ''
  BUILD_PUSH_CACHE_FROM: ''
  BUILD_PUSH_CACHE_TO: ''
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
  REPOSITORY_OWNER: cloudnative-pg
  SIGN_IMAGES: 'true'
  SLACK_USERNAME: cnpg-bot
  BUILD_MANAGER_RELEASE_ARGS: build --skip=validate --clean --id manager
  PLATFORMS: linux/amd64,linux/arm64
  E2E_SUFFIX: cnpge2e
defaults:
  run:
    shell: bash -Eeuo pipefail -x {0}
jobs:
  smoke_test_release_branches:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    name: smoke test release-* branches when it's a scheduled run
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        branch:
        - release-1.25
        - release-1.28
        - release-1.29
    env:
      BRANCH: ${{ matrix.branch }}
    steps:
    - name: Invoke workflow with inputs
      uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4
      with:
        workflow: continuous-delivery
        ref: ${{ env.BRANCH }}
        inputs: '{ "depth": "push", "limit": "kind", "test_level": "4", "log_level":
          "debug" }'
  check_commenter:
    if: 'github.event_name == ''issue_comment'' &&

      github.event.action == ''created'' &&

      github.event.issue.pull_request &&

      startsWith(github.event.comment.body, ''/test'')

      '
    name: Retrieve command
    permissions:
      pull-requests: write
      contents: read
      issues: read
    runs-on: ubuntu-24.04
    outputs:
      github_ref: ${{ steps.refs.outputs.head_sha }}
      depth: ${{ env.DEPTH }}
      limit: ${{ env.LIMIT }}
      test_level: ${{ env.TEST_LEVEL }}
      feature_type: ${{ env.FEATURE_TYPE }}
      log_level: ${{ env.LOG_LEVEL }}
    steps:
    - name: Check for Command
      id: command
      uses: xt0rted/slash-command-action@bf51f8f5f4ea3d58abc7eca58f77104182b23e88
      continue-on-error: false
      with:
        command: test
        reaction: 'true'
        reaction-type: eyes
        allow-edits: 'false'
        permission-level: write
    - name: Process arguments
      id: args
      env:
        ARGS: ${{ steps.command.outputs.command-arguments }}
      run: "# Set the defaults\nDEPTH=\"main\"\nLIMIT=\"kind\"\nTEST_LEVEL=\"4\"\n\
        FEATURE_TYPE=\"\"\nLOG_LEVEL=\"debug\"\n\nfor ARG in $ARGS; do\n  IFS='='\
        \ read name value <<< $ARG\n  case \"${name}\" in\n    \"depth\"|\"d\")\n\
        \    DEPTH=\"${value}\"\n    ;;\n    \"limit\"|\"l\")\n    LIMIT=\"${value}\"\
        \n    ;;\n    \"test_level\"|\"level\"|\"tl\")\n    TEST_LEVEL=\"${value}\"\
        \n    ;;\n    \"feature_type\"|\"type\"|\"ft\")\n    FEATURE_TYPE=\"${value}\"\
        \n    ;;\n    \"log_level\"|\"ll\")\n    LOG_LEVEL=\"${value}\"\n    ;;\n\
        \    *)\n    ;;\n  esac\ndone\n\necho \"DEPTH=${DEPTH}\" >> $GITHUB_ENV\n\
        echo \"LIMIT=${LIMIT}\" >> $GITHUB_ENV\necho \"TEST_LEVEL=${TEST_LEVEL}\"\
        \ >> $GITHUB_ENV\necho \"FEATURE_TYPE=${FEATURE_TYPE}\" >> $GITHUB_ENV\necho\
        \ \"LOG_LEVEL=${LOG_LEVEL}\" >> $GITHUB_ENV\n"
    - name: Resolve Git reference
      uses: xt0rted/pull-request-comment-branch@e8b8daa837e8ea7331c0003c9c316a64c6d8b0b1
      id: refs
    - name: Create comment
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        issue-number: ${{ github.event.issue.number }}
        body: '@${{ github.actor }}, here''s the link to the E2E on CNPG workflow
          run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id
          }}

          '
  test_arguments:
    name: Parse arguments
    if: 'github.event_name == ''workflow_dispatch'' || github.event_name == ''schedule''

      '
    runs-on: ubuntu-24.04
    outputs:
      github_ref: ${{ github.ref }}
      depth: ${{ env.DEPTH }}
      limit: ${{ env.LIMIT }}
      test_level: ${{ env.TEST_LEVEL }}
      feature_type: ${{ env.FEATURE_TYPE }}
      log_level: ${{ env.LOG_LEVEL }}
    steps:
    - name: Parse input to env
      env:
        EVENT_NAME: ${{ github.event_name }}
        INPUT_DEPTH: ${{ github.event.inputs.depth }}
        INPUT_LIMIT: ${{ github.event.inputs.limit }}
        INPUT_TEST_LEVEL: ${{ github.event.inputs.test_level }}
        INPUT_FEATURE_TYPE: ${{ github.event.inputs.feature_type }}
        INPUT_LOG_LEVEL: ${{ github.event.inputs.log_level }}
      run: "# Set the defaults for workflow dispatch\nif [[ \"${EVENT_NAME}\" == 'workflow_dispatch'\
        \ ]]; then\n  DEPTH=\"${INPUT_DEPTH}\"\n  LIMIT=\"${INPUT_LIMIT}\"\n  TEST_LEVEL=\"\
        ${INPUT_TEST_LEVEL}\"\n  FEATURE_TYPE=\"${INPUT_FEATURE_TYPE}\"\n  LOG_LEVEL=\"\
        ${INPUT_LOG_LEVEL}\"\nfi\n# Set the defaults for schedule dispatch\nif [[\
        \ \"${EVENT_NAME}\" == 'schedule' ]]; then\n  DEPTH=\"schedule\"\n  LIMIT=\"\
        \"\n  TEST_LEVEL=\"4\"\n  FEATURE_TYPE=\"\"\n  LOG_LEVEL=\"debug\"\nfi\necho\
        \ \"DEPTH=${DEPTH}\" >> $GITHUB_ENV\necho \"LIMIT=${LIMIT}\" >> $GITHUB_ENV\n\
        echo \"TEST_LEVEL=${TEST_LEVEL}\" >> $GITHUB_ENV\necho \"FEATURE_TYPE=${FEATURE_TYPE}\"\
        \ >> $GITHUB_ENV\necho \"LOG_LEVEL=${LOG_LEVEL}\" >> $GITHUB_ENV\n"
  evaluate_options:
    name: Evaluate workflow options
    needs:
    - check_commenter
    - test_arguments
    runs-on: ubuntu-24.04
    if: "(\n  needs.check_commenter.result == 'success' ||\n  needs.test_arguments.result\
      \ == 'success'\n) &&\n!cancelled()\n"
    outputs:
      git_ref: ${{ env.GITHUB_REF }}
      depth: ${{ env.DEPTH }}
      limit: ${{ env.LIMIT }}
      test_level: ${{ env.TEST_LEVEL }}
      feature_type: ${{ env.FEATURE_TYPE }}
      log_level: ${{ env.LOG_LEVEL }}
      runs_on: ${{ steps.set-runner.outputs.runs_on }}
    steps:
    - name: From command
      env:
        EVENT_NAME: ${{ github.event_name }}
        WD_GITHUB_REF: ${{ needs.test_arguments.outputs.github_ref }}
        WD_DEPTH: ${{ needs.test_arguments.outputs.depth }}
        WD_LIMIT: ${{ needs.test_arguments.outputs.limit }}
        WD_TEST_LEVEL: ${{ needs.test_arguments.outputs.test_level }}
        WD_FEATURE_TYPE: ${{ needs.test_arguments.outputs.feature_type }}
        WD_LOG_LEVEL: ${{ needs.test_arguments.outputs.log_level }}
        IC_GITHUB_REF: ${{ needs.check_commenter.outputs.github_ref }}
        IC_DEPTH: ${{ needs.check_commenter.outputs.depth }}
        IC_LIMIT: ${{ needs.check_commenter.outputs.limit }}
        IC_TEST_LEVEL: ${{ needs.check_commenter.outputs.test_level }}
        IC_FEATURE_TYPE: ${{ needs.check_commenter.outputs.feature_type }}
        IC_LOG_LEVEL: ${{ needs.check_commenter.outputs.log_level }}
      run: "if [[ \"${EVENT_NAME}\" == 'workflow_dispatch' ]] || [[ \"${EVENT_NAME}\"\
        \ == 'schedule' ]]; then\n  echo \"GITHUB_REF=${WD_GITHUB_REF}\" >> $GITHUB_ENV\n\
        \  echo \"DEPTH=${WD_DEPTH}\" >> $GITHUB_ENV\n  echo \"LIMIT=${WD_LIMIT}\"\
        \ >> $GITHUB_ENV\n  echo \"TEST_LEVEL=${WD_TEST_LEVEL}\" >> $GITHUB_ENV\n\
        \  echo \"FEATURE_TYPE=${WD_FEATURE_TYPE}\" >> $GITHUB_ENV\n  echo \"LOG_LEVEL=${WD_LOG_LEVEL}\"\
        \ >> $GITHUB_ENV\nfi\nif [[ \"${EVENT_NAME}\" == 'issue_comment' ]]; then\n\
        \  echo \"GITHUB_REF=${IC_GITHUB_REF}\" >> $GITHUB_ENV\n  echo \"DEPTH=${IC_DEPTH}\"\
        \ >> $GITHUB_ENV\n  echo \"LIMIT=${IC_LIMIT}\" >> $GITHUB_ENV\n  echo \"TEST_LEVEL=${IC_TEST_LEVEL}\"\
        \ >> $GITHUB_ENV\n  echo \"FEATURE_TYPE=${IC_FEATURE_TYPE}\" >> $GITHUB_ENV\n\
        \  echo \"LOG_LEVEL=${IC_LOG_LEVEL}\" >> $GITHUB_ENV\nfi\n"
    - name: Set runner based on organization
      env:
        REPO_OWNER: ${{ github.repository_owner }}
      id: set-runner
      run: "if [[ \"${REPO_OWNER}\" == \"cloudnative-pg\" ]]; then\n  echo \"runs_on=ubuntu-latest-16-cores\"\
        \ >> $GITHUB_OUTPUT\nelse\n  echo \"runs_on=ubuntu-24.04\" >> $GITHUB_OUTPUT\n\
        fi\n"
  buildx:
    name: Build containers
    needs:
    - check_commenter
    - test_arguments
    - evaluate_options
    if: 'always() && !cancelled() &&

      needs.evaluate_options.result == ''success''

      '
    runs-on: ${{ needs.evaluate_options.outputs.runs_on }}
    permissions:
      contents: read
      packages: write
      pull-requests: read
      id-token: write
    outputs:
      branch_name: ${{ steps.build-meta.outputs.branch_name }}
      upload_artifacts: ${{ steps.build-meta.outputs.upload_artifacts }}
      commit_msg: ${{ steps.build-meta.outputs.commit_msg }}
      commit_sha: ${{ steps.build-meta.outputs.commit_sha }}
      author_name: ${{ steps.build-meta.outputs.author_name }}
      author_email: ${{ steps.build-meta.outputs.author_email }}
      controller_img: ${{ env.CONTROLLER_IMG }}
      controller_img_digest: ${{ fromJSON(steps.bake-push.outputs.metadata)['distroless']['containerimage.digest']
        }}
      controller_img_prime_digest: ${{ steps.build-prime.outputs.digest }}
      controller_img_ubi: ${{ env.CONTROLLER_IMG_UBI }}
      index_img: ${{ env.INDEX_IMG }}
      bundle_img: ${{ env.BUNDLE_IMG }}
      catalog_img: ${{ env.CATALOG_IMG }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ needs.evaluate_options.outputs.git_ref }}
        fetch-depth: 0
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Build meta
      id: build-meta
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COMMIT_REF: ${{ needs.evaluate_options.outputs.git_ref }}
        EVENT_NAME: ${{ github.event_name }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: "commit_sha=\"${COMMIT_REF}\"\ncommit_date=$(git log -1 --pretty=format:'%ad'\
        \ --date short \"${commit_sha}\" || : )\n# use git describe to get the nearest\
        \ tag and use that to build the version (e.g. 1.4.0-dev24 or 1.4.0)\ncommit_version=$(git\
        \ describe --tags --match 'v*' \"${commit_sha}\"| sed -e 's/^v//; s/-g[0-9a-f]\\\
        +$//; s/-\\([0-9]\\+\\)$/-dev\\1/')\n\n# shortened commit sha\ncommit_short=$(git\
        \ rev-parse --short \"${commit_sha}\")\n\n# multiline strings are weird\n\
        commit_message=$(git show -s --format=%B \"${commit_sha}\")\ncommit_message=${commit_message//$'%'/'%25'}\n\
        commit_message=${commit_message//$'\\n'/'%0A'}\ncommit_message=${commit_message//$'\\\
        r'/'%0D'}\n\n# get git user and email\nauthor_name=$(git show -s --format='%an'\
        \ \"${commit_sha}\" | head -n1)\nauthor_email=$(git show -s --format='%ae'\
        \ \"${commit_sha}\" | head -n1)\n\n# extract branch name\nif [[ \"${EVENT_NAME}\"\
        \ == 'workflow_dispatch' ]] || [[ \"${EVENT_NAME}\" == 'schedule' ]]\nthen\n\
        \  branch_name=${GITHUB_REF#refs/heads/}\nfi\nif [[ \"${EVENT_NAME}\" == 'issue_comment'\
        \ ]]\nthen\n  branch_name=$(gh pr view \"${ISSUE_NUMBER}\" --json headRefName\
        \ -q '.headRefName' 2>/dev/null)\nfi\n\n# extract tag from branch name\ntag_name=$(echo\
        \ \"$branch_name\" | tr / -)\n\nupload_artifacts=false\nif [[ ${branch_name}\
        \ == main || ${branch_name} =~ ^release- ]]; then\n  upload_artifacts=true\n\
        fi\n\necho \"DATE=${commit_date}\" >> $GITHUB_ENV\necho \"VERSION=${commit_version}\"\
        \ >> $GITHUB_ENV\necho \"COMMIT=${commit_short}\" >> $GITHUB_ENV\necho \"\
        IMAGE_TAG=${tag_name,,}\" >> $GITHUB_ENV\necho \"REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}\"\
        \ >> $GITHUB_ENV\necho \"commit_sha=${commit_sha}\" >> $GITHUB_OUTPUT\necho\
        \ \"commit_msg=${commit_message}\" >> $GITHUB_OUTPUT\necho \"author_name=${author_name}\"\
        \ >> $GITHUB_OUTPUT\necho \"author_email=${author_email}\" >> $GITHUB_OUTPUT\n\
        echo \"branch_name=${branch_name}\" >> $GITHUB_OUTPUT\necho \"upload_artifacts=${upload_artifacts}\"\
        \ >> $GITHUB_OUTPUT\n"
    - name: Set GoReleaser environment
      run: 'echo GOPATH=$(go env GOPATH) >> $GITHUB_ENV

        echo PWD=$(pwd) >> $GITHUB_ENV

        '
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c
      with:
        distribution: goreleaser
        version: v2
        args: ${{ env.BUILD_MANAGER_RELEASE_ARGS }}
      env:
        DATE: ${{ env.DATE }}
        COMMIT: ${{ env.COMMIT }}
        VERSION: ${{ env.VERSION }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
      with:
        platforms: ${{ env.PLATFORMS }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: Login into docker registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.REGISTRY_USER }}
        password: ${{ env.REGISTRY_PASSWORD }}
    - name: Build and push
      uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8
      id: bake-push
      env:
        BUILDX_METADATA_PROVENANCE: disabled
        environment: testing
        buildVersion: ${{ env.VERSION }}
        tag: ${{ env.IMAGE_TAG }}
        registry: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}
        revision: ${{ env.COMMIT }}
      with:
        source: .
        push: true
        no-cache: true
        targets: default
    - name: Install cosign
      if: env.SIGN_IMAGES == 'true'
      uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac
    - name: Sign images
      if: env.SIGN_IMAGES == 'true'
      env:
        BAKE_METADATA: ${{ steps.bake-push.outputs.metadata }}
      run: "images=$(echo \"${BAKE_METADATA}\" |\n  jq -r '.[] | (.\"image.name\"\
        \ | sub(\",.*\";\"\" )) + \"@\" + .\"containerimage.digest\"'\n)\ncosign sign\
        \ --yes ${images}\n"
    - name: Output images
      env:
        DISTROLESS: ${{ fromJSON(steps.bake-push.outputs.metadata)['distroless']['image.name']
          }}
        UBI: ${{ fromJSON(steps.bake-push.outputs.metadata)['ubi']['image.name'] }}
      run: 'echo "CONTROLLER_IMG=${DISTROLESS}" >> $GITHUB_ENV

        echo "CONTROLLER_IMG_UBI=${UBI}" >> $GITHUB_ENV

        echo "BUNDLE_IMG=${UBI}-bundle" >> $GITHUB_ENV

        echo "INDEX_IMG=${UBI}-index" >> $GITHUB_ENV

        echo "CATALOG_IMG=${UBI}-catalog" >> $GITHUB_ENV

        '
    - name: Generate manifest for operator deployment
      id: generate-manifest
      env:
        CONTROLLER_IMG: ${{ env.CONTROLLER_IMG }}
        CONTROLLER_IMG_DIGEST: ${{ fromJSON(steps.bake-push.outputs.metadata)['distroless']['containerimage.digest']
          }}
      run: 'make generate-manifest

        '
    - name: Upload the operator manifest as artifact in workflow
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: operator-manifest.yaml
        path: dist/operator-manifest.yaml
        retention-days: 7
    - name: Build binary for upgrade test
      uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c
      if: needs.evaluate_options.outputs.test_level == '4'
      with:
        distribution: goreleaser
        version: v2
        args: ${{ env.BUILD_MANAGER_RELEASE_ARGS }}
      env:
        DATE: ${{ env.DATE }}
        COMMIT: ${{ env.COMMIT }}
        VERSION: ${{ env.VERSION }}-prime
    - name: Build and push image for upgrade test
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
      id: build-prime
      if: needs.evaluate_options.outputs.test_level == '4'
      with:
        platforms: ${{ env.PLATFORMS }}
        context: .
        file: Dockerfile
        push: true
        build-args: 'VERSION=${{ env.VERSION }}-prime

          '
        tags: ${{ env.CONTROLLER_IMG }}-prime
        provenance: ${{ env.BUILD_PUSH_PROVENANCE }}
        cache-from: ${{ env.BUILD_PUSH_CACHE_FROM }}
        cache-to: ${{ env.BUILD_PUSH_CACHE_TO }}
  publish-artifacts:
    name: Publish artifacts
    needs:
    - buildx
    if: '(always() && !cancelled()) &&

      needs.buildx.result == ''success'' &&

      needs.buildx.outputs.upload_artifacts == ''true'' &&

      github.repository_owner == ''playground-nils''

      '
    runs-on: ubuntu-24.04
    env:
      BRANCH: ${{ needs.buildx.outputs.branch_name }}
    steps:
    - name: Checkout artifact
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: cloudnative-pg/artifacts
        token: ${{ secrets.REPO_GHA_PAT }}
        ref: main
        fetch-depth: 0
    - name: Configure git user
      env:
        AUTHOR_EMAIL: ${{ needs.buildx.outputs.author_email }}
        AUTHOR_NAME: ${{ needs.buildx.outputs.author_name }}
      run: 'git config user.email "${AUTHOR_EMAIL}"

        git config user.name "${AUTHOR_NAME}"

        '
    - name: Switch to or create the right branch
      run: 'git checkout "${BRANCH}" 2>/dev/null || git checkout -b "${BRANCH}"


        # Remove the previous operator manifest if present because the next

        # step doesn''t overwrite existing files

        rm -fr manifests/operator-manifest.yaml

        '
    - name: Prepare the operator manifest
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: operator-manifest.yaml
        path: manifests
    - name: Prepare the commit
      env:
        COMMIT_MESSAGE: '${{ needs.buildx.outputs.commit_msg }}


          https://github.com/cloudnative-pg/cloudnative-pg/commit/${{ needs.buildx.outputs.commit_sha
          }}

          '
      run: '# Skip creating the commit if there are no changes

        [ -n "$(git status -s)" ] || exit 0


        git add .

        git commit -m "${COMMIT_MESSAGE}"

        '
    - name: Push changes
      uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599
      with:
        github_token: ${{ secrets.REPO_GHA_PAT }}
        repository: cloudnative-pg/artifacts
        branch: ${{ env.BRANCH }}
  generate-jobs:
    name: Generate jobs for E2E tests
    needs:
    - buildx
    - evaluate_options
    if: '(always() && !cancelled()) &&

      needs.buildx.result == ''success''

      '
    runs-on: ubuntu-24.04
    outputs:
      controller_img: ${{ needs.buildx.outputs.controller_img }}
      kindMatrix: ${{ steps.generate-jobs.outputs.kindMatrix }}
      kindEnabled: ${{ steps.generate-jobs.outputs.kindEnabled }}
      kindTimeout: ${{ steps.generate-jobs.outputs.kindE2ETimeout }}
      k3dMatrix: ${{ steps.generate-jobs.outputs.k3dMatrix }}
      k3dEnabled: ${{ steps.generate-jobs.outputs.k3dEnabled }}
      k3dTimeout: ${{ steps.generate-jobs.outputs.k3dE2ETimeout }}
      eksMatrix: ${{ steps.generate-jobs.outputs.eksMatrix }}
      eksEnabled: ${{ steps.generate-jobs.outputs.eksEnabled }}
      eksTimeout: ${{ steps.generate-jobs.outputs.eksE2ETimeout }}
      aksMatrix: ${{ steps.generate-jobs.outputs.aksMatrix }}
      aksEnabled: ${{ steps.generate-jobs.outputs.aksEnabled }}
      aksTimeout: ${{ steps.generate-jobs.outputs.aksE2ETimeout }}
      gkeMatrix: ${{ steps.generate-jobs.outputs.gkeMatrix }}
      gkeEnabled: ${{ steps.generate-jobs.outputs.gkeEnabled }}
      gkeTimeout: ${{ steps.generate-jobs.outputs.gkeE2ETimeout }}
      openshiftMatrix: ${{ steps.generate-jobs.outputs.openshiftMatrix }}
      openshiftEnabled: ${{ steps.generate-jobs.outputs.openshiftEnabled }}
      openshiftTimeout: ${{ steps.generate-jobs.outputs.openshiftE2ETimeout }}
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ needs.evaluate_options.outputs.git_ref }}
    - id: generate-jobs
      name: Generate Jobs
      shell: bash
      env:
        DEPTH: ${{ needs.evaluate_options.outputs.depth }}
        LIMIT: ${{ needs.evaluate_options.outputs.limit }}
      run: "python .github/e2e-matrix-generator.py \\\n  -m \"${DEPTH}\" \\\n  -l\
        \ \"${LIMIT}\"\n"
  e2e-kind:
    name: Run E2E on kind executors
    if: '(always() && !cancelled()) &&

      needs.generate-jobs.outputs.kindEnabled == ''true'' &&

      needs.generate-jobs.result == ''success''

      '
    needs:
    - buildx
    - generate-jobs
    - evaluate_options
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-jobs.outputs.kindMatrix) }}
    runs-on: ${{ needs.evaluate_options.outputs.runs_on }}
    env:
      TEST_DEPTH: ${{ needs.evaluate_options.outputs.test_level }}
      FEATURE_TYPE: ${{ needs.evaluate_options.outputs.feature_type }}
      K8S_VERSION: ${{ matrix.k8s_version }}
      POSTGRES_VERSION: ${{ matrix.postgres_version }}
      POSTGRES_KIND: ${{ matrix.postgres_kind }}
      MATRIX: ${{ matrix.id }}
